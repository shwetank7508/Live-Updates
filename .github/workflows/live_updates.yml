name: Daily Market Briefing — 9:30 AM

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1-5'

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install libraries
        run: pip install yfinance feedparser requests pandas numpy

      - name: Send morning briefing
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python master_briefing.py
