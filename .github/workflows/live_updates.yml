name: Market Updates — All Schedules

on:
  workflow_dispatch:  # Manual trigger anytime
  schedule:
    # 8:30 AM IST = 3:00 AM UTC (Mon-Fri)
    - cron: '0 3 * * 1-5'
    # 9:10 AM IST = 3:40 AM UTC (Mon-Fri)
    - cron: '40 3 * * 1-5'
    # 9:30 AM IST = 4:00 AM UTC (Mon-Fri)
    - cron: '0 4 * * 1-5'
    # Every 15 min from 9:45 AM to 3:30 PM IST
    # 9:45 AM IST  = 4:15 AM UTC
    - cron: '15 4 * * 1-5'
    # 10:00 AM IST = 4:30 AM UTC
    - cron: '30 4 * * 1-5'
    # 10:15 AM IST = 4:45 AM UTC
    - cron: '45 4 * * 1-5'
    # 10:30 AM IST = 5:00 AM UTC
    - cron: '0 5 * * 1-5'
    # 10:45 AM IST = 5:15 AM UTC
    - cron: '15 5 * * 1-5'
    # 11:00 AM IST = 5:30 AM UTC
    - cron: '30 5 * * 1-5'
    # 11:15 AM IST = 5:45 AM UTC
    - cron: '45 5 * * 1-5'
    # 11:30 AM IST = 6:00 AM UTC
    - cron: '0 6 * * 1-5'
    # 11:45 AM IST = 6:15 AM UTC
    - cron: '15 6 * * 1-5'
    # 12:00 PM IST = 6:30 AM UTC
    - cron: '30 6 * * 1-5'
    # 12:15 PM IST = 6:45 AM UTC
    - cron: '45 6 * * 1-5'
    # 12:30 PM IST = 7:00 AM UTC
    - cron: '0 7 * * 1-5'
    # 12:45 PM IST = 7:15 AM UTC
    - cron: '15 7 * * 1-5'
    # 1:00 PM IST = 7:30 AM UTC
    - cron: '30 7 * * 1-5'
    # 1:15 PM IST = 7:45 AM UTC
    - cron: '45 7 * * 1-5'
    # 1:30 PM IST = 8:00 AM UTC
    - cron: '0 8 * * 1-5'
    # 1:45 PM IST = 8:15 AM UTC
    - cron: '15 8 * * 1-5'
    # 2:00 PM IST = 8:30 AM UTC
    - cron: '30 8 * * 1-5'
    # 2:15 PM IST = 8:45 AM UTC
    - cron: '45 8 * * 1-5'
    # 2:30 PM IST = 9:00 AM UTC
    - cron: '0 9 * * 1-5'
    # 2:45 PM IST = 9:15 AM UTC
    - cron: '15 9 * * 1-5'
    # 3:00 PM IST = 9:30 AM UTC
    - cron: '30 9 * * 1-5'
    # 3:15 PM IST = 9:45 AM UTC
    - cron: '45 9 * * 1-5'

jobs:
  market-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install libraries
        run: pip install yfinance feedparser requests pandas numpy

      - name: Determine which script to run
        id: script
        run: |
          # Get current UTC time
          HOUR=$(date -u +%H)
          MIN=$(date -u +%M)
          TIME_NUM=$((HOUR * 60 + MIN))

          echo "Current UTC: ${HOUR}:${MIN} (${TIME_NUM} mins)"

          # Define time windows (UTC)
          # 8:30 AM IST = 3:00 UTC = 180 mins
          # 9:10 AM IST = 3:40 UTC = 220 mins
          # 9:30 AM IST = 4:00 UTC = 240 mins
          # Market hours: 4:15 to 10:00 UTC

          if [ $TIME_NUM -ge 178 ] && [ $TIME_NUM -le 185 ]; then
            echo "script=briefing_830.py" >> $GITHUB_OUTPUT
            echo "Running: 8:30 AM Morning Briefing"

          elif [ $TIME_NUM -ge 218 ] && [ $TIME_NUM -le 225 ]; then
            echo "script=briefing_910.py" >> $GITHUB_OUTPUT
            echo "Running: 9:10 AM Pre-Open Update"

          elif [ $TIME_NUM -ge 238 ] && [ $TIME_NUM -le 245 ]; then
            echo "script=briefing_930.py" >> $GITHUB_OUTPUT
            echo "Running: 9:30 AM Ratio Spread"

          elif [ $TIME_NUM -ge 255 ] && [ $TIME_NUM -le 605 ]; then
            echo "script=update_15min.py" >> $GITHUB_OUTPUT
            echo "Running: 15-min Market Update"

          else
            echo "script=none" >> $GITHUB_OUTPUT
            echo "Outside scheduled windows — skipping"
          fi

      - name: Run market script
        if: steps.script.outputs.script != 'none'
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          echo "Running: ${{ steps.script.outputs.script }}"
          python ${{ steps.script.outputs.script }}
